<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('로그인')}"></head>
<body>

<header th:replace="~{fragments/siteHeader :: headerSimple}"></header>

<div class="container">
    <h1 class="page-title">LOGIN</h1>

    <div class="card card-sm mt-24">
        <div th:if="${param.error != null}" class="alert alert-error">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        <form th:action="@{/member/login}" method="post">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">로그인</button>
                <a href="/member/reg" class="btn btn-outline">회원가입</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
