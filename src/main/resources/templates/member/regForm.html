<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('회원가입')}"></head>
<body>

	<header th:replace="~{fragments/siteHeader :: headerSimple}"></header>

	<div class="container">
		<h1 class="page-title">REGISTER</h1>

		<div class="card card-sm mt-24">
			<form th:action="@{/member/reg}" method="post">
				<div class="form-group">
					<label>아이디</label> <input type="text" name="username" required>
				</div>
				<div class="form-group">
					<label>비밀번호</label> <input type="password" name="password" required>
				</div>
				<div class="form-group">
					<label>닉네임</label> <input type="text" name="nickname" required>
				</div>
				<div class="form-actions">
					<button type="submit" class="btn btn-primary">가입하기</button>
					<a href="/member/login" class="btn btn-outline">로그인으로 돌아가기</a>
				</div>
			</form>
		</div>
	</div>

</body>
</html>
