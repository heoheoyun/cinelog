<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

	<!--
  사용법:
    등록: th:replace="~{fragments/genre :: genreOptions(null)}"
    수정: th:replace="~{fragments/genre :: genreOptions(${movie.genre})}"
-->
	<th:block th:fragment="genreOptions(selected)">
		<option value="">선택</option>
		<option value="액션" th:selected="${selected == '액션'}">액션</option>
		<option value="드라마" th:selected="${selected == '드라마'}">드라마</option>
		<option value="코미디" th:selected="${selected == '코미디'}">코미디</option>
		<option value="SF" th:selected="${selected == 'SF'}">SF</option>
		<option value="공포" th:selected="${selected == '공포'}">공포</option>
		<option value="로맨스" th:selected="${selected == '로맨스'}">로맨스</option>
		<option value="애니메이션" th:selected="${selected == '애니메이션'}">애니메이션</option>
		<option value="기타" th:selected="${selected == '기타'}">기타</option>
	</th:block>

</body>
</html>
